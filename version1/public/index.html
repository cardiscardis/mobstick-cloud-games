<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Space Drift — Controller</title>
    <link rel="stylesheet" href="controller.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Join Screen -->
    <div id="join-screen">
        <div class="join-content">
            <h1>SPACE DRIFT</h1>
            <p class="subtitle">CONTROLLER</p>
            <div class="input-group">
                <label for="room-input">ENTER ROOM CODE</label>
                <input type="text" id="room-input" maxlength="6" placeholder="ABC123" autocomplete="off"
                    autocorrect="off" spellcheck="false">
            </div>
            <button id="join-btn">CONNECT</button>
            <p id="error-msg" class="error-msg"></p>
        </div>
    </div>

    <!-- Controller Screen -->
    <div id="controller-screen" class="hidden">
        <div id="controller-header">
            <div class="status-pill">
                <div class="dot connected"></div>
                <span>Connected</span>
            </div>
            <div id="player-badge" class="player-badge hidden">
                <span id="player-badge-text">P1</span>
            </div>
            <span id="room-label"></span>
        </div>

        <div id="controller-area">
            <!-- Joystick Zone (left) -->
            <div id="joystick-zone">
                <div id="joystick-base">
                    <div id="joystick-ring"></div>
                    <div id="joystick-stick"></div>
                </div>
                <span class="zone-label">MOVE</span>
            </div>

            <!-- Buttons Zone (right) -->
            <div id="buttons-zone">
                <button id="btn-fire" class="action-btn fire-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3" />
                        <path d="M12 2v4M12 18v4M2 12h4M18 12h4" />
                    </svg>
                    <span>FIRE</span>
                </button>
                <button id="btn-boost" class="action-btn boost-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10" />
                    </svg>
                    <span>BOOST</span>
                </button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="controller.js"></script>
</body>

</html>
